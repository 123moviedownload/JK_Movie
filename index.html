<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>JK Movies - Watch Latest Bollywood & Hollywood Movies Online Free</title>
    <meta name="description" content="Watch the latest Bollywood, Hollywood, Hindi Dubbed, and Bengali movies online for free on JK Movies. High-quality streaming and daily updates.">
    <meta name="keywords" content="JK Movies, Watch Online, Free Movies, Bollywood Movies 2026, Hollywood Hindi Dubbed, South Indian Movies, New Movie Releases">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="JK Movies - Premium Movie Portal">
    <meta property="og:description" content="Stream your favorite movies for free.">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg-color: #0c0d10;
            --card-bg: #1a1c22;
            --accent: #ffcc00;
            --text-main: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { background: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; }

        header {
            position: sticky; top: 0; width: 100%; z-index: 1000;
            background: rgba(12, 13, 16, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass);
        }

        .main-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; }
        .logo { font-size: 22px; font-weight: bold; color: var(--accent); text-decoration: none; }
        .icon-btn { background: var(--glass); border: none; color: white; padding: 8px; border-radius: 50%; cursor: pointer; font-size: 18px; }

        /* মেনু বাটন অফ করার জন্য স্টাইল */
        .disabled-btn { opacity: 0.5; cursor: default !important; }

        #search-container { display: none; padding: 10px 20px; background: #1a1c22; }
        #search-input { width: 100%; padding: 10px; border-radius: 5px; border: none; outline: none; background: #333; color: white; }

        .category-box { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
        .cat-item { background: var(--glass); padding: 8px 20px; border-radius: 25px; font-size: 13px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; transition: 0.3s; }
        .cat-item:hover { background: var(--accent); color: #000; }

        .content-area { padding: 15px 20px; }
        .section-title { font-size: 16px; color: var(--accent); margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        .container { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 15px; 
            margin-bottom: 30px; 
        }

        @media (max-width: 1024px) { .container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 768px) { .container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 480px) { .container { grid-template-columns: repeat(2, 1fr); } }

        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; border: 1px solid #333; }
        .movie-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .movie-card img { width: 100%; height: 230px; object-fit: cover; }
        .movie-card h3 { font-size: 12px; margin: 0; text-align: center; padding: 10px; height: 35px; overflow: hidden; }
        
        .rating { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #ffcc00; padding: 3px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; z-index: 5; }

        #ad-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        
        #auto-popup-ad { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10001; 
            align-items: center; justify-content: center; 
        }
        .popup-content { 
            position: relative; background: #fff; width: 300px; height: 250px; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #000;
        }
        .close-ad { 
            position: absolute; top: -15px; right: -15px; width: 30px; height: 30px; 
            background: #ffcc00; color: #000; border-radius: 50%; border: none; 
            font-weight: bold; cursor: pointer; font-size: 18px; line-height: 30px; text-align: center;
        }

        .btn-go { padding: 15px 35px; background: var(--accent); color: #000; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <header>
        <div class="main-nav">
            <button class="icon-btn disabled-btn" style="pointer-events: none;">☰</button>
            <a href="#" class="logo">JK<span>Movies</span></a>
            <button class="icon-btn" onclick="toggleSearch()">🔍</button>
        </div>
        
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search for movies..." onkeypress="handleSearchEnter(event)">
        </div>

        <div class="category-box">
            <div class="cat-item" onclick="handleCategory('Hollywood')">🎬 Hollywood</div>
            <div class="cat-item" onclick="handleCategory('Bollywood')">🇮🇳 Bollywood</div>
            <div class="cat-item" onclick="handleCategory('Hindi Dubbed')">🍿 Hindi Dubbed</div>
            <div class="cat-item" onclick="handleCategory('Bengali')"> Bengali</div>
        </div>
    </header>

    <div class="content-area">
        <div class="section-title">Bollywood Movies</div>
        <div class="container" id="bollywood-grid"></div>

        <div class="section-title">Hollywood Movies</div>
        <div class="container" id="hollywood-grid"></div>
    </div>

    <div id="ad-overlay">
        <h2 style="color: var(--accent);">Processing Request...</h2>
        <div style="width:300px; height:250px; background:#fff; margin-bottom:20px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#000;">[ CLICK AD ]</div>
        <p id="timer" style="color:white;"></p>
        <button id="final-btn" class="btn-go" style="display:none;">WATCH NOW</button>
    </div>

    <div id="auto-popup-ad">
        <div class="popup-content">
            <button class="close-ad" onclick="closeAutoAd()">X</button>
            <div id="popup-ad-placeholder">[ AUTO POP-UP AD ]</div>
        </div>
    </div>

    <script>
        const API_KEY = '0940ae0fad7498e6f74514a9691fb571';

        // অটোমেটিক পপ-আপ অ্যাড
        setInterval(() => {
            document.getElementById('auto-popup-ad').style.display = 'flex';
        }, 30000);

        function closeAutoAd() {
            document.getElementById('auto-popup-ad').style.display = 'none';
        }

        // মুভি লোড করার ফাংশন (২০০টি মুভি লোড করার লজিক)
        async function fetchMovies() {
            const bollyGrid = document.getElementById('bollywood-grid');
            const hollyGrid = document.getElementById('hollywood-grid');
            
            // Bollywood ২০০ মুভি (১০ পেজ লোড হবে)
            for(let i=1; i<=10; i++) {
                const bollyRes = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=hi&sort_by=popularity.desc&page=${i}`);
                const bollyData = await bollyRes.json();
                renderMovies(bollyData.results, 'bollywood-grid');
            }

            // Hollywood ২০০ মুভি (১০ পেজ লোড হবে)
            for(let i=1; i<=10; i++) {
                const hollyRes = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=en&sort_by=popularity.desc&page=${i}`);
                const hollyData = await hollyRes.json();
                renderMovies(hollyData.results, 'hollywood-grid');
            }
        }

        function renderMovies(movies, gridId) {
            const grid = document.getElementById(gridId);
            movies.forEach(movie => {
                if (!movie.poster_path) return;
                const card = document.createElement('div');
                card.className = 'movie-card';
                const rating = movie.vote_average ? `<div class="rating">⭐ ${movie.vote_average.toFixed(1)}</div>` : '';
                card.innerHTML = `
                    ${rating}
                    <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}" loading="lazy">
                    <div class="info"><h3>${movie.title}</h3></div>
                `;
                card.onclick = () => handleAd(movie.title);
                grid.appendChild(card);
            });
        }

        function handleAd(movieName) {
            const overlay = document.getElementById('ad-overlay');
            const timerText = document.getElementById('timer');
            const watchBtn = document.getElementById('final-btn');
            overlay.style.display = 'flex';
            let timeLeft = 5; 
            watchBtn.style.display = 'none';
            timerText.style.display = 'block';

            const countdown = setInterval(() => {
                timeLeft--;
                timerText.innerText = "Link is ready in " + timeLeft + "s";
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    timerText.style.display = 'none';
                    watchBtn.style.display = 'block';
                }
            }, 1000);

            watchBtn.onclick = () => {
                overlay.style.display = 'none';
                window.location.href = "https://prmovies.pizza/?s=" + encodeURIComponent(movieName);
            };
        }

        function toggleSearch() {
            const sc = document.getElementById('search-container');
            sc.style.display = (sc.style.display === 'block') ? 'none' : 'block';
        }

        function handleSearchEnter(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('search-input').value;
                if(query) window.location.href = "https://prmovies.pizza/?s=" + encodeURIComponent(query);
            }
        }

        function handleCategory(language) {
            window.location.href = "https://prmovies.pizza/?s=" + encodeURIComponent(language);
        }

        fetchMovies();
    </script>
</body>
</html>
