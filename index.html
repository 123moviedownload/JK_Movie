<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK Movie Portal</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; }
        .ad-space { background: #ffcc00; color: #000; padding: 15px; font-weight: bold; }
        .main-btn { 
            background: red; color: #fff; padding: 20px; 
            display: inline-block; margin-top: 100px; 
            text-decoration: none; border-radius: 10px; font-size: 20px; 
        }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; padding-top:100px; }
    </style>
</head>
<body>

    <div class="ad-space">
        আপনার ব্যানার বিজ্ঞাপন (Banner Ad) এখানে
    </div>

    <h1>JK MOVIE পোর্টালে স্বাগতম</h1>
    <p>সরাসরি মুভি দেখতে নিচের বাটনে ক্লিক করুন</p>

    <a href="javascript:void(0)" class="main-btn" onclick="startAd()">সব মুভি এখানে দেখুন (ENTER SITE)</a>

    <div id="overlay">
        <h2>মুভি সার্ভার লোড হচ্ছে...</h2>
        <div style="background:#fff; width:300px; height:250px; margin: 20px auto; color:#000; line-height:250px;">
            আপনার অ্যাড (Square Ad) এখানে
        </div>
        <p id="timer">অপেক্ষা করুন ৫ সেকেন্ড...</p>
        <button id="final-btn" style="display:none; padding:15px; background:green; color:#fff; border:none; cursor:pointer;">মুভি দেখুন</button>
    </div>

    <script>
        function startAd() {
            document.getElementById('overlay').style.display = 'block';
            let sec = 5;
            const timer = setInterval(() => {
                sec--;
                document.getElementById('timer').innerText = "অপেক্ষা করুন " + sec + " সেকেন্ড...";
                if(sec <= 0) {
                    clearInterval(timer);
                    document.getElementById('timer').style.display = 'none';
                    document.getElementById('final-btn').style.display = 'inline-block';
                }
            }, 1000);

            document.getElementById('final-btn').onclick = function() {
                window.location.href = "https://prmovies.pizza/";
            };
        }
    </script>
</body>
</html>
