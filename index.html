<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK Movie Home</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .ad-top { background: yellow; color: #000; padding: 10px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .movie-card { background: #222; border-radius: 8px; padding: 5px; cursor: pointer; }
        .movie-card img { width: 100%; border-radius: 5px; height: 200px; object-fit: cover; }
        .movie-card h3 { font-size: 12px; margin: 5px 0; height: 35px; overflow: hidden; }
        #loading { margin-top: 50px; font-size: 18px; color: yellow; }
    </style>
</head>
<body>

    <div class="ad-top">আপনার ব্যানার বিজ্ঞাপন এখানে - JK MOVIE</div>

    <div id="loading">মুভি লোড হচ্ছে... (১০ সেকেন্ড সময় লাগতে পারে)</div>
    <div class="container" id="movie-list"></div>

    <script>
        // এটি একটি শক্তিশালী প্রক্সি যা ডেটা টেনে আনবে
        const url = 'https://prmovies.pizza/';
        const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);

        fetch(proxy)
            .then(response => response.json())
            .then(data => {
                const html = data.contents;
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // মুভি আইটেমগুলো খুঁজে বের করা
                const items = doc.querySelectorAll('.ml-item');
                const list = document.getElementById('movie-list');
                document.getElementById('loading').style.display = 'none';

                items.forEach(item => {
                    const title = item.querySelector('h2').innerText;
                    const img = item.querySelector('img').getAttribute('data-original') || item.querySelector('img').src;
                    const link = item.querySelector('a').href.replace(window.location.origin, 'https://prmovies.pizza');

                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `<img src="${img}"><h3>${title}</h3>`;
                    
                    // ক্লিকে রিডাইরেক্ট লজিক
                    card.onclick = () => {
                        alert("মুভিটি লোড করার আগে একটি অ্যাড দেখানো হবে।");
                        window.location.href = link;
                    };
                    list.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('loading').innerText = "সার্ভার স্লো, পেজটি রিফ্রেশ দিন।";
            });
    </script>
</body>
</html>
