<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK Movie Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* নিচের লেয়ারে মুভি সাইট (যদি লোড হয়) */
        #movie-frame {
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* উপরের বিজ্ঞাপনের লেয়ার (Floating Layer) */
        .my-ad-layer {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999; /* সবকিছুর উপরে থাকবে */
            background: rgba(255, 255, 255, 0.9);
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            text-align: center;
            min-width: 320px;
        }

        .close-ad {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-weight: bold;
            line-height: 25px;
        }

        /* যদি Iframe ব্লক থাকে তবে মেসেজ */
        .error-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="my-ad-layer" id="adLayer">
        <div class="close-ad" onclick="document.getElementById('adLayer').style.display='none'">X</div>
        <div style="color: #333; font-size: 12px; margin-bottom: 5px;">SPONSORED AD</div>
        
        <div id="ad-content">
            <p style="color: blue;">আপনার অ্যাড এখানে দেখাবে</p>
            </div>
    </div>

    <iframe id="movie-frame" src="https://prmovies.pizza/" allowfullscreen></iframe>

    <div class="error-overlay">
        <p>মুভিটি সরাসরি লোড না হলে নিচের বাটনে ক্লিক করুন:</p>
        <a href="https://prmovies.pizza/" style="color: yellow; font-size: 20px;">সরাসরি মুভি দেখুন</a>
    </div>

</body>
</html>
